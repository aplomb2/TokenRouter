# TokenRouter Configuration
# Copy this to config.yaml and fill in your API keys

# === Self-hosted mode (new) ===

# Admin token for management API (required for key management endpoints)
# Can also be set via TOKENROUTER_ADMIN_TOKEN environment variable
admin_token: ${TOKENROUTER_ADMIN_TOKEN}

# Database path (optional, default: ~/.tokenrouter/keys.db)
database: ~/.tokenrouter/keys.db

# Baseline model for savings comparison (default: claude-opus-4)
baseline_model: claude-opus-4

# === Provider keys ===
# Also supports legacy single-user mode (direct keys, skips tr-key validation)
keys:
  openai: ${OPENAI_API_KEY}          # supports environment variables
  anthropic: ${ANTHROPIC_API_KEY}
  google: ${GOOGLE_API_KEY}
  deepseek: ${DEEPSEEK_API_KEY}
  # moonshot: ${MOONSHOT_API_KEY}    # Kimi / Moonshot
  # qwen: ${DASHSCOPE_API_KEY}       # Qwen (Alibaba)
  # zhipu: ${ZHIPU_API_KEY}          # GLM (Zhipu)

# Routing strategy: cheapest | best | balanced
strategy: balanced

# Optional: custom routing rules (override auto-routing for specific tasks)
rules:
  - task: coding
    model: deepseek-chat           # Force coding tasks to use DeepSeek
  - task: chinese_language
    model: qwen-max                # Chinese tasks -> Qwen

# Optional: exclude expensive models
exclude_models:
  - claude-opus-4                  # too expensive

# Proxy server settings (for `tokenrouter serve`)
proxy:
  host: 0.0.0.0
  port: 8000
  cors: true
